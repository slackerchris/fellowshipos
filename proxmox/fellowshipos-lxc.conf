# FellowshipOS LXC Template
# Copy to /etc/pve/lxc/<vmid>.conf and adjust as needed
# Or use as reference when creating via Proxmox UI

# Basic
arch: amd64
ostype: debian
hostname: fellowshipos
description: FellowshipOS - Debian Trixie homelab node

# Resources - adjust per role
cores: 2
memory: 2048
swap: 512

# Boot
onboot: 1
startup: order=1

# Network - adjust bridge and IP to match your setup
net0: name=eth0,bridge=vmbr0,firewall=1,ip=dhcp

# Storage - adjust storage pool to match your Proxmox setup
rootfs: local-lvm:8

# Features
# Uncomment 'nesting=1' for docker-node flavor
# Uncomment 'keyctl=1' for docker-node flavor
features: nesting=0

# Unprivileged by default - set to 0 for docker-node flavor
unprivileged: 1

# Console
console: 1
tty: 2

# DNS - adjust to your homelab DNS
nameserver: 1.1.1.1
searchdomain: local
