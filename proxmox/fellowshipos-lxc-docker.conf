# FellowshipOS LXC Template - Docker Node variant
# Docker requires privileged container + nesting + keyctl
# Copy to /etc/pve/lxc/<vmid>.conf and adjust as needed

# Basic
arch: amd64
ostype: debian
hostname: fellowshipos-docker
description: FellowshipOS - Docker node

# Resources - docker needs more headroom
cores: 4
memory: 4096
swap: 1024

# Boot
onboot: 1
startup: order=2

# Network
net0: name=eth0,bridge=vmbr0,firewall=1,ip=dhcp

# Storage - docker needs more disk
rootfs: local-lvm:32

# Features - required for Docker
features: keyctl=1,nesting=1

# Must be privileged for Docker
unprivileged: 0

# Console
console: 1
tty: 2

# DNS
nameserver: 1.1.1.1
searchdomain: local
